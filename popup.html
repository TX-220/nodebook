<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Mind Map v2.0</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-theme">
    <header id="app-header">
        <div class="header-top">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search bookmarks..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>
            <div class="tab-actions">
                <button class="btn btn-primary" id="fullscreen-btn">✨ OPEN IN FULL TAB</button>
            </div>
        </div>
        <div class="header-bottom">
            <div class="view-controls">
                <button class="btn btn-secondary btn-sm" id="layout-toggle-btn">Layout: Gantt</button>
                <button class="btn btn-secondary btn-sm" id="effects-toggle-btn">Effects: ON</button>
                <button class="btn btn-secondary btn-sm" id="expand-all-btn">Expand All</button>
                <button class="btn btn-secondary btn-sm" id="collapse-all-btn">Collapse All</button>
                <button class="btn btn-secondary btn-sm" id="reset-view-btn">Reset View</button>
            </div>
            <div class="tool-controls">
                <button class="btn btn-secondary btn-sm" id="import-btn">Import</button>
                <button class="btn btn-secondary btn-sm" id="export-json-btn">Export</button>
                <button class="btn btn-icon btn-sm" id="open-manager-btn" title="Open Chrome Manager">📂</button>
            </div>
        </div>
    </header>

    <main id="view-container">
        <div id="mindmap"></div>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p>Mapping your world...</p>
        </div>
    </main>

    <footer id="app-footer">
        <div id="stats">0 bookmarks | 0 folders</div>
        <div class="credits">Bookmark Mind Map v2.0</div>
    </footer>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <header>
                <h3 id="modal-title">Import Bookmarks</h3>
                <button class="close-btn">&times;</button>
            </header>
            <div class="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- UI Components -->
    <div id="toast-container"></div>
    <div id="context-menu" class="hidden"></div>

    <!-- Scripts -->
    <script src="d3.v7.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
